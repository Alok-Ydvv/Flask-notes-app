{% extends 'base.html' %}

{% block title %}Edit Note{% endblock %}

{% block content %}
<div class="section-header">
    <h2><i class="fas fa-edit"></i> Edit Note</h2>
</div>
<form method="POST">
    <div class="mb-4">
        <label for="title" class="form-label"><i class="fas fa-heading"></i> Title</label>
        <input type="text" class="form-control" id="title" name="title" value="{{ note.title }}" required>
    </div>
    <div class="mb-4">
        <label for="content" class="form-label"><i class="fas fa-align-left"></i> Content</label>
        <textarea class="form-control" id="content" name="content" rows="8" required>{{ note.content }}</textarea>
    </div>
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
            <i class="fas fa-check"></i> Update Note
        </button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">
            <i class="fas fa-times"></i> Cancel
        </a>
    </div>
</form>
{% endblock %}
